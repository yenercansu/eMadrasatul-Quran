kind = "mobile"
previewPath = "/"
title = "Quran App"
version = "1.0.0"
id = "artifacts/quran-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18917

[services.development]
run = "pnpm --filter @workspace/quran-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/quran-app", "run", "serve" ]

[services.env]
PORT = "18917"
BASE_PATH = "/"
